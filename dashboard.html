<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panini</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a1628; color: #fff; }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(135deg, #0f2027, #203a43); padding: 25px; position: fixed; height: 100%; overflow-y: auto; z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 35px; text-align: center; }
        .logo span { background: linear-gradient(135deg, #e31837, #ff6b35); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; color: #aaa; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.08); color: white; }
        .nav-item i { width: 24px; }
        .main-content { flex: 1; margin-left: 280px; padding: 25px 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); }
        .stat-number { font-size: 32px; font-weight: 800; color: #ffc107; }
        .stat-label { font-size: 13px; opacity: 0.7; margin-top: 5px; }
        .data-table { background: rgba(255,255,255,0.05); border-radius: 20px; overflow-x: auto; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
        th { background: rgba(255,255,255,0.05); color: #ffc107; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .status-select { padding: 8px 12px; border-radius: 10px; background: #1a2a3a; color: white; border: none; cursor: pointer; }
        .btn-view, .btn-delete-order { background: #6c5ce7; border: none; padding: 6px 12px; border-radius: 8px; color: white; cursor: pointer; margin: 2px; font-size: 12px; }
        .btn-delete-order { background: #dc3545; }
        .btn-primary { background: #e31837; border: none; padding: 10px 20px; border-radius: 10px; color: white; cursor: pointer; margin-bottom: 15px; font-weight: 600; }
        .btn-success { background: #28a745; border: none; padding: 12px 25px; border-radius: 10px; color: white; cursor: pointer; font-weight: 600; }
        .form-card { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #ccc; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #e31837; }
        .product-image-preview { max-width: 60px; max-height: 60px; object-fit: contain; background: white; border-radius: 8px; padding: 5px; margin-right: 10px; vertical-align: middle; }
        .chart-container { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-top: 30px; }
        canvas { max-height: 300px; width: 100%; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0a2b3d, #1a5a7a); position: fixed; width: 100%; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-card h2 { color: #e31837; margin-bottom: 10px; font-size: 28px; }
        .login-card p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; transition: 0.2s; }
        .login-card input:focus { outline: none; border-color: #e31837; }
        .login-card button { width: 100%; padding: 14px; background: #e31837; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .login-card button:hover { background: #c4122e; transform: scale(1.02); }
        .total-paid { background: linear-gradient(135deg, #28a745, #20c997); }
        .domain-info { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .current-domain { color: #ffc107; font-weight: bold; }
        .test-pixel-btn { background: #17a2b8; border: none; padding: 8px 15px; border-radius: 8px; color: white; cursor: pointer; font-size: 12px; margin-top: 10px; }
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; margin-right: 10px; vertical-align: middle; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.3s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: 0.3s; border-radius: 50%; }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(30px); }
        .cloaker-status { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-left: 10px; }
        .cloaker-active { background: #28a745; color: white; }
        .cloaker-inactive { background: #dc3545; color: white; }
        .chat-messages { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .chat-message { margin-bottom: 15px; padding: 10px; border-radius: 12px; max-width: 80%; }
        .chat-message.admin { background: #e31837; color: white; margin-left: auto; text-align: right; }
        .chat-message.client { background: rgba(255,255,255,0.1); color: white; }
        .chat-message small { font-size: 10px; opacity: 0.7; display: block; margin-top: 5px; }
        .chat-input-group { display: flex; gap: 10px; }
        .chat-input-group input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .chat-input-group button { background: #e31837; border: none; padding: 12px 25px; border-radius: 25px; color: white; cursor: pointer; }
        .edit-product-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .edit-product-modal.active { display: flex; }
        .edit-product-content { background: #1a1a2e; border-radius: 20px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 25px; border: 1px solid #e31837; }
        .edit-product-content h3 { margin-bottom: 20px; color: #e31837; }
        @media (max-width: 768px) { .sidebar { width: 80px; padding: 20px 10px; } .sidebar .nav-item span { display: none; } .main-content { margin-left: 80px; padding: 15px; } th, td { padding: 8px; font-size: 12px; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        (function() {
            // CREDENCIAIS
            const LOGIN_USER = 'bbc';
            const LOGIN_PASS = 'Deus@2011';
            let isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
            let editingProductId = null;
            
            // IMAGENS
            const IMG_ALBUM = 'https://panini.com.br/media/catalog/product/b/r/brochura_-_de_p_.jpg';
            const IMG_BOX_LUVA = 'https://panini.com.br/media/catalog/product/3/2/32_fwc26_-_box_luva_premium_ta_a_ecommercepanini.jpg';
            const IMG_BOX_ENVELOPE = 'https://venda.panini.com.br/media/catalog/product/0/3/03_fwc26_-_box_envelope_bancas.jpg';
            const IMG_ENVELOPE = 'https://venda.panini.com.br/media/catalog/product/1/2/12_evelopes.jpg';
            const IMG_PANINI_LOGO = 'https://panini.com.br/static/version1745861418/frontend/Panini/hybros/pt_BR/images/logo.svg';
            
            // 30 PRODUTOS
            const products30 = [
                { id: 1, name: "🔥 SUPER MEGA KIT - 50 Envelopes", price: 299.90, oldPrice: 500.00, image: IMG_BOX_ENVELOPE, category: "featured", badge: "OFERTA" },
                { id: 2, name: "KIT COMPLETO - Album + 30 Envelopes", price: 249.90, oldPrice: 399.90, image: IMG_BOX_LUVA, category: "featured", badge: "KIT MEGA" },
                { id: 3, name: "Pacote Figurinhas Prata", price: 49.90, oldPrice: 99.90, image: IMG_ENVELOPE, category: "featured", badge: "PRATA" },
                { id: 4, name: "Leve 3 Pague 2 - Envelopes", price: 20.00, oldPrice: 30.00, image: IMG_ENVELOPE, category: "featured", badge: "PROMO" },
                { id: 5, name: "Pacote Figurinhas Ouro", price: 79.90, oldPrice: 199.90, image: IMG_ENVELOPE, category: "featured", badge: "OURO" },
                { id: 6, name: "Kit Familia", price: 199.90, oldPrice: 349.90, image: IMG_BOX_LUVA, category: "featured", badge: "FAMILIA" },
                { id: 7, name: "Black Friday - Kit 15 Envelopes", price: 69.90, oldPrice: 150.00, image: IMG_BOX_ENVELOPE, category: "featured", badge: "BLACK" },
                { id: 8, name: "Combo Album + 5 Envelopes", price: 59.90, oldPrice: 99.90, image: IMG_BOX_LUVA, category: "featured", badge: "COMBO" },
                { id: 9, name: "Kit 20 Envelopes", price: 140.00, oldPrice: 200.00, image: IMG_BOX_ENVELOPE, category: "featured", badge: "ECONOMIZE" },
                { id: 10, name: "Box Colecionador", price: 79.90, oldPrice: 149.90, image: IMG_BOX_LUVA, category: "featured", badge: "BOX" },
                { id: 11, name: "⭐ Neymar Jr - Autografada", price: 499.90, oldPrice: 999.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "LENDARIA" },
                { id: 12, name: "👑 Pelé Edição", price: 299.90, oldPrice: 599.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "REI" },
                { id: 13, name: "💎 Cristiano Ronaldo", price: 399.90, oldPrice: 799.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "DIAMANTE" },
                { id: 14, name: "🐐 Lionel Messi", price: 599.90, oldPrice: 1299.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "GOAT" },
                { id: 15, name: "🥈 Vinicius Jr", price: 149.90, oldPrice: 299.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "PRATA" },
                { id: 16, name: "📜 Pacote LENDAS", price: 99.90, oldPrice: 199.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "LENDAS" },
                { id: 17, name: "⚡ Mbappé Relâmpago", price: 199.90, oldPrice: 399.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "RELAMPAGO" },
                { id: 18, name: "🌍 Copa 2026", price: 29.90, oldPrice: 49.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "MUNDIAL" },
                { id: 19, name: "🥇 Haaland Ouro", price: 179.90, oldPrice: 349.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "OURO" },
                { id: 20, name: "🎁 Box LENDARIAS", price: 499.90, oldPrice: 999.90, image: IMG_PANINI_LOGO, category: "legendary", badge: "BOX" },
                { id: 21, name: "📘 Album Capa Dura", price: 89.90, oldPrice: 129.90, image: IMG_ALBUM, category: "worldcup", badge: "LANCAMENTO" },
                { id: 22, name: "📘 Album Capa Cartao", price: 39.90, oldPrice: 59.90, image: IMG_ALBUM, category: "worldcup", badge: "MAIS VENDIDO" },
                { id: 23, name: "📦 Kit 12 Envelopes", price: 84.00, oldPrice: 120.00, image: IMG_BOX_ENVELOPE, category: "worldcup", badge: "OFERTA" },
                { id: 24, name: "📦 Kit 10 Envelopes", price: 75.00, oldPrice: 100.00, image: IMG_BOX_ENVELOPE, category: "worldcup", badge: "MAIS VENDIDO" },
                { id: 25, name: "🎁 Kit Album + 10 Envelopes", price: 99.90, oldPrice: 149.90, image: IMG_BOX_LUVA, category: "worldcup", badge: "KIT" },
                { id: 26, name: "🔄 Envelope Avulso", price: 10.00, oldPrice: 12.90, image: IMG_ENVELOPE, category: "bestseller", badge: "UNITARIO" },
                { id: 27, name: "🏆 Kit Album + 20 Envelopes", price: 179.90, oldPrice: 259.90, image: IMG_BOX_LUVA, category: "bestseller", badge: "SUPER KIT" },
                { id: 28, name: "🖼️ Poster Gigante", price: 29.90, oldPrice: 49.90, image: IMG_ALBUM, category: "bestseller", badge: "EXCLUSIVO" },
                { id: 29, name: "✍️ Caneta Oficial", price: 19.90, oldPrice: 29.90, image: IMG_ENVELOPE, category: "bestseller", badge: "COLECIONAVEL" },
                { id: 30, name: "📦 Maleta Especial", price: 149.90, oldPrice: 199.90, image: IMG_BOX_ENVELOPE, category: "bestseller", badge: "LIMITADA" }
            ];
            
            localStorage.setItem('panini_products', JSON.stringify(products30));
            
            if (!localStorage.getItem('panini_orders')) {
                localStorage.setItem('panini_orders', JSON.stringify([
                    { id: "ORD-001", customer: "João Silva", email: "joao@email.com", total: "299.90", date: new Date().toLocaleString(), status: "paid" },
                    { id: "ORD-002", customer: "Maria Santos", email: "maria@email.com", total: "149.90", date: new Date().toLocaleString(), status: "pending" }
                ]));
            }
            
            // CONFIGURAÇÕES
            const defaultConfig = {
                siteDomain: window.location.origin,
                whatsappNumber: '5511999999999',
                whatsappMessage: 'Olá! Gostaria de saber mais sobre as figurinhas',
                facebookPixelId: '',
                tiktokPixelId: '',
                googleAnalyticsId: '',
                facebookPixelActive: false,
                tiktokPixelActive: false,
                googleAnalyticsActive: false,
                cloakerActive: false
            };
            let siteConfig = JSON.parse(localStorage.getItem('panini_site_config') || JSON.stringify(defaultConfig));
            
            // INICIALIZAR CHAT
            if (!localStorage.getItem('chat_messages')) {
                localStorage.setItem('chat_messages', JSON.stringify([]));
            }
            let chatInterval = null;
            
            function loadChatMessages() {
                const messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
                const container = document.getElementById('chatMessagesContainer');
                if (!container) return;
                let html = '';
                messages.forEach(msg => {
                    const isAdmin = msg.sender === 'admin';
                    html += `<div class="chat-message ${isAdmin ? 'admin' : 'client'}">
                        <strong>${isAdmin ? 'Admin' : 'Cliente'}</strong>
                        <p>${escapeHtml(msg.message)}</p>
                        <small>${msg.time}</small>
                    </div>`;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function sendAdminMessage() {
                const input = document.getElementById('chatAdminInput');
                const message = input.value.trim();
                if (!message) return;
                const messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
                messages.push({ sender: 'admin', message: message, time: new Date().toLocaleTimeString() });
                localStorage.setItem('chat_messages', JSON.stringify(messages));
                input.value = '';
                loadChatMessages();
            }
            
            function clearChat() {
                if (confirm('Limpar todas as mensagens?')) {
                    localStorage.setItem('chat_messages', JSON.stringify([]));
                    loadChatMessages();
                }
            }
            
            function startChatPolling() {
                if (chatInterval) clearInterval(chatInterval);
                chatInterval = setInterval(() => loadChatMessages(), 3000);
            }
            
            function stopChatPolling() {
                if (chatInterval) { clearInterval(chatInterval); chatInterval = null; }
            }
            
            // FUNÇÕES DOS PRODUTOS
            function openEditProductModal(id) {
                const products = JSON.parse(localStorage.getItem('panini_products') || '[]');
                const product = products.find(p => p.id === id);
                if (!product) return;
                
                editingProductId = id;
                document.getElementById('editProdId').value = product.id;
                document.getElementById('editProdName').value = product.name;
                document.getElementById('editProdPrice').value = product.price;
                document.getElementById('editProdOldPrice').value = product.oldPrice;
                document.getElementById('editProdImage').value = product.image;
                document.getElementById('editProdCategory').value = product.category;
                document.getElementById('editProdBadge').value = product.badge;
                document.getElementById('editProductModal').classList.add('active');
                
                // Preview da imagem
                const preview = document.getElementById('editImagePreview');
                if (preview) preview.src = product.image;
            }
            
            function closeEditProductModal() {
                document.getElementById('editProductModal').classList.remove('active');
                editingProductId = null;
            }
            
            function saveProductEdit() {
                const products = JSON.parse(localStorage.getItem('panini_products') || '[]');
                const index = products.findIndex(p => p.id === editingProductId);
                if (index === -1) return;
                
                products[index] = {
                    ...products[index],
                    name: document.getElementById('editProdName').value,
                    price: parseFloat(document.getElementById('editProdPrice').value),
                    oldPrice: parseFloat(document.getElementById('editProdOldPrice').value) || 0,
                    image: document.getElementById('editProdImage').value,
                    category: document.getElementById('editProdCategory').value,
                    badge: document.getElementById('editProdBadge').value
                };
                
                localStorage.setItem('panini_products', JSON.stringify(products));
                closeEditProductModal();
                renderProductsTable();
                alert('✅ Produto atualizado com sucesso!');
            }
            
            function updateImagePreview() {
                const url = document.getElementById('editProdImage').value;
                const preview = document.getElementById('editImagePreview');
                if (preview) preview.src = url;
            }
            
            function deleteProductFromEdit() {
                if (confirm('Tem certeza que deseja excluir este produto permanentemente?')) {
                    let products = JSON.parse(localStorage.getItem('panini_products') || '[]');
                    products = products.filter(p => p.id !== editingProductId);
                    localStorage.setItem('panini_products', JSON.stringify(products));
                    closeEditProductModal();
                    renderProductsTable();
                    alert('✅ Produto excluído!');
                }
            }
            
            function showAddProductForm() {
                const id = Math.max(...JSON.parse(localStorage.getItem('panini_products')||'[]').map(p=>p.id),0)+1;
                const nome = prompt('Nome do produto:');
                if(nome){
                    const preco = parseFloat(prompt('Preço:'));
                    const old = parseFloat(prompt('Preço antigo:'));
                    const img = prompt('URL da imagem:');
                    const cat = prompt('Categoria (featured/legendary/worldcup/bestseller):');
                    const badge = prompt('Badge:');
                    if(nome && preco && img){
                        let p = JSON.parse(localStorage.getItem('panini_products')||'[]');
                        p.push({id:id, name:nome, price:preco, oldPrice:old, image:img, category:cat, badge:badge});
                        localStorage.setItem('panini_products', JSON.stringify(p));
                        renderProductsTable();
                        alert('Produto adicionado!');
                    }
                }
            }
            
            function renderProductsTable() {
                const products = JSON.parse(localStorage.getItem('panini_products')||'[]');
                const tbody = document.getElementById('productsTableBody');
                if (!tbody) return;
                let html = '';
                products.forEach(p => {
                    html += `<tr>
                        <td>${p.id}</td>
                        <td><img src="${p.image}" class="product-image-preview" onerror="this.src='https://placehold.co/60x60/e31837/white?text=PN'"></td>
                        <td>${p.name}</td>
                        <td style="color:#ffc107;">R$ ${p.price.toFixed(2)}</td>
                        <td>R$ ${p.oldPrice.toFixed(2)}</td>
                        <td>${p.category}</td>
                        <td>${p.badge}</td>
                        <td><button class="btn-view" onclick="openEditProductModal(${p.id})"><i class="fas fa-edit"></i> Editar</button></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            }
            
            function updateStatus(id, status) {
                let orders = JSON.parse(localStorage.getItem('panini_orders')||'[]');
                orders = orders.map(ord => ord.id === id ? {...ord, status} : ord);
                localStorage.setItem('panini_orders', JSON.stringify(orders));
                showTab('orders');
            }
            
            function viewOrder(id) {
                const order = JSON.parse(localStorage.getItem('panini_orders')||'[]').find(ord => ord.id === id);
                if(order) alert(`📦 PEDIDO #${order.id}\nCliente: ${order.customer}\nEmail: ${order.email}\nTotal: R$ ${parseFloat(order.total).toFixed(2)}\nStatus: ${order.status === 'pending' ? 'Pendente' : 'Pago'}`);
            }
            
            function deleteOrder(id) {
                if(confirm(`Excluir pedido #${id}?`)){
                    let orders = JSON.parse(localStorage.getItem('panini_orders')||'[]');
                    orders = orders.filter(ord => ord.id !== id);
                    localStorage.setItem('panini_orders', JSON.stringify(orders));
                    showTab('orders');
                }
            }
            
            // CONFIGURAÇÕES
            function updateGeneratedPixelCode() {
                let code = `<!-- PIXELS GERADOS PELO ADMIN -->\n\n`;
                if (siteConfig.facebookPixelActive && siteConfig.facebookPixelId) {
                    code += `<script>fbq('init', '${siteConfig.facebookPixelId}'); fbq('track', 'PageView');<\/script>\n`;
                }
                if (siteConfig.tiktokPixelActive && siteConfig.tiktokPixelId) {
                    code += `<script>ttq.load('${siteConfig.tiktokPixelId}'); ttq.page();<\/script>\n`;
                }
                if (siteConfig.googleAnalyticsActive && siteConfig.googleAnalyticsId) {
                    code += `<script async src="https://www.googletagmanager.com/gtag/js?id=${siteConfig.googleAnalyticsId}"><\/script><script>gtag('js', new Date()); gtag('config', '${siteConfig.googleAnalyticsId}');<\/script>\n`;
                }
                const ta = document.getElementById('generatedPixelCode');
                if (ta) ta.value = code;
            }
            
            function savePixelConfig() {
                siteConfig.facebookPixelId = document.getElementById('fbPixelId').value.trim();
                siteConfig.tiktokPixelId = document.getElementById('ttPixelId').value.trim();
                siteConfig.googleAnalyticsId = document.getElementById('gaId').value.trim();
                siteConfig.facebookPixelActive = document.getElementById('fbPixelActive').checked;
                siteConfig.tiktokPixelActive = document.getElementById('ttPixelActive').checked;
                siteConfig.googleAnalyticsActive = document.getElementById('gaActive').checked;
                localStorage.setItem('panini_site_config', JSON.stringify(siteConfig));
                updateGeneratedPixelCode();
                alert('✅ Configurações salvas!');
            }
            
            function saveDomainConfig() {
                const nd = document.getElementById('siteDomain').value.trim();
                if (nd) {
                    siteConfig.siteDomain = nd;
                    localStorage.setItem('panini_site_config', JSON.stringify(siteConfig));
                    document.getElementById('currentDomainDisplay').innerText = nd;
                    alert('✅ Domínio salvo!');
                }
            }
            
            function saveWhatsAppConfig() {
                const whatsapp = document.getElementById('whatsappNumber').value.trim();
                const message = document.getElementById('whatsappMessage').value.trim();
                if (whatsapp) {
                    siteConfig.whatsappNumber = whatsapp;
                    siteConfig.whatsappMessage = message;
                    localStorage.setItem('panini_site_config', JSON.stringify(siteConfig));
                    alert('✅ WhatsApp configurado!');
                }
            }
            
            function saveCloakerConfig() {
                siteConfig.cloakerActive = document.getElementById('cloakerActive').checked;
                localStorage.setItem('panini_site_config', JSON.stringify(siteConfig));
                const statusSpan = document.getElementById('cloakerStatusSpan');
                if (statusSpan) {
                    statusSpan.className = siteConfig.cloakerActive ? 'cloaker-status cloaker-active' : 'cloaker-status cloaker-inactive';
                    statusSpan.innerText = siteConfig.cloakerActive ? 'ATIVADO' : 'DESATIVADO';
                }
                alert('✅ Cloaker configurado!');
            }
            
            function copyPixelCode() {
                const ta = document.getElementById('generatedPixelCode');
                if (ta) { ta.select(); document.execCommand('copy'); alert('✅ Código copiado!'); }
            }
            
            function copyCloakerCode() {
                const code = `<!-- CLOAKER - BLOQUEIO DE BOTS -->\n<script>\n(function() {\n    const paisPermitido = 'BR';\n    const userLang = navigator.language || navigator.userLanguage;\n    const userCountry = userLang.slice(-2);\n    const ua = navigator.userAgent;\n    const isBot = /bot|crawler|spider|scraper|facebookexternalhit|Facebot|Twitterbot|TikTok|Googlebot|Mediapartners/i.test(ua);\n    const isBR = userCountry === 'BR';\n    const cloakerAtivo = ${siteConfig.cloakerActive};\n    if (cloakerAtivo && (!isBR || isBot)) {\n        const receitas = ["<h1>Bolo de Chocolate</h1><p>Ingredientes: 3 ovos, 1 xicara de leite, 2 xicaras de farinha...</p>","<h1>Bolo de Cenoura</h1><p>Ingredientes: 3 cenouras, 3 ovos, 2 xicaras de acucar...</p>"];\n        document.body.innerHTML = '<div style=\"font-family:Arial;max-width:800px;margin:50px auto;padding:20px;\">' + receitas[Math.floor(Math.random()*receitas.length)] + '</div>';\n    }\n})();\n<\/script>`;
                const ta = document.getElementById('generatedCloakerCode');
                if (ta) { ta.value = code; ta.select(); document.execCommand('copy'); alert('✅ Código do Cloaker copiado!'); }
            }
            
            function testPixel(type) {
                if (type === 'facebook') alert('🔍 Use extensão "Facebook Pixel Helper"');
                else if (type === 'tiktok') alert('🔍 Use extensão "TikTok Pixel Helper"');
                else alert('🔍 Use extensão "Google Tag Assistant"');
            }
            
            // RENDERIZAÇÃO DAS ABAS
            function showTab(tab) {
                const main = document.getElementById('mainContent');
                if (!main) return;
                const orders = JSON.parse(localStorage.getItem('panini_orders') || '[]');
                const totalPaid = orders.filter(o => o.status === 'paid').reduce((s, o) => s + parseFloat(o.total), 0);
                const totalRevenue = orders.reduce((s, o) => s + parseFloat(o.total), 0);
                const stats = { total: orders.length, pending: orders.filter(o => o.status === 'pending').length, paid: orders.filter(o => o.status === 'paid').length, totalRevenue, totalPaid };
                
                if (tab === 'orders') {
                    let html = `<div class="header"><h2>📦 Pedidos</h2></div>
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">Total Pedidos</div></div>
                            <div class="stat-card"><div class="stat-number">R$ ${totalRevenue.toFixed(2)}</div><div class="stat-label">Faturamento</div></div>
                            <div class="stat-card total-paid"><div class="stat-number">R$ ${totalPaid.toFixed(2)}</div><div class="stat-label">💰 Recebido</div></div>
                        </div>
                        <div class="data-table"><table><thead><tr><th>ID</th><th>Cliente</th><th>Email</th><th>Total</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead><tbody>`;
                    if (orders.length === 0) html += `<tr><td colspan="7">Nenhum pedido encontrado</td></tr>`;
                    else orders.forEach(o => {
                        html += `<tr>
                            <td><strong>#${o.id}</strong></td>
                            <td>${o.customer}</td>
                            <td>${o.email || '-'}</td>
                            <td style="color:#ffc107;">R$ ${parseFloat(o.total).toFixed(2)}</td>
                            <td>${o.date}</td>
                            <td><select class="status-select" onchange="updateStatus('${o.id}',this.value)">
                                <option value="pending" ${o.status==='pending'?'selected':''}>⏳ Pendente</option>
                                <option value="paid" ${o.status==='paid'?'selected':''}>✅ Pago</option></select></td>
                            <td><button class="btn-view" onclick="viewOrder('${o.id}')">Ver</button> <button class="btn-delete-order" onclick="deleteOrder('${o.id}')">Excluir</button></td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                    main.innerHTML = html;
                } else if (tab === 'products') {
                    main.innerHTML = `
                        <div class="header"><h2>🛍️ Produtos</h2><button class="btn-primary" onclick="showAddProductForm()"><i class="fas fa-plus"></i> Adicionar Produto</button></div>
                        <div class="data-table">
                            <table>
                                <thead><tr><th>ID</th><th>Imagem</th><th>Nome</th><th>Preço</th><th>Preço Antigo</th><th>Categoria</th><th>Badge</th><th>Ações</th></tr></thead>
                                <tbody id="productsTableBody"></tbody>
                            </table>
                        </div>
                        <div id="editProductModal" class="edit-product-modal">
                            <div class="edit-product-content">
                                <h3><i class="fas fa-edit"></i> Editar Produto</h3>
                                <div class="form-group"><label>ID</label><input type="text" id="editProdId" readonly disabled style="background:#333;"></div>
                                <div class="form-group"><label>Nome</label><input type="text" id="editProdName"></div>
                                <div class="form-group"><label>Preço (R$)</label><input type="number" id="editProdPrice" step="0.01"></div>
                                <div class="form-group"><label>Preço Antigo (R$)</label><input type="number" id="editProdOldPrice" step="0.01"></div>
                                <div class="form-group"><label>URL da Imagem</label><input type="text" id="editProdImage" onchange="updateImagePreview()"></div>
                                <div class="form-group"><img id="editImagePreview" class="product-image-preview" style="max-width:100px; margin-bottom:10px;"></div>
                                <div class="form-group"><label>Categoria</label><select id="editProdCategory"><option value="featured">Ofertas</option><option value="legendary">Lendárias</option><option value="worldcup">Copa 2026</option><option value="bestseller">Mais Vendidos</option></select></div>
                                <div class="form-group"><label>Badge</label><input type="text" id="editProdBadge"></div>
                                <div style="display:flex; gap:10px; margin-top:20px;">
                                    <button class="btn-success" onclick="saveProductEdit()"><i class="fas fa-save"></i> Salvar Alterações</button>
                                    <button class="btn-delete-order" onclick="deleteProductFromEdit()"><i class="fas fa-trash"></i> Excluir Produto</button>
                                    <button class="btn-view" onclick="closeEditProductModal()">Cancelar</button>
                                </div>
                            </div>
                        </div>`;
                    renderProductsTable();
                } else if (tab === 'stats') {
                    const last7Days = []; for (let i=6;i>=0;i--) { let d = new Date(); d.setDate(d.getDate()-i); last7Days.push(d.toLocaleDateString('pt-BR')); }
                    const salesByDay = last7Days.map(d => orders.filter(o => new Date(o.date).toLocaleDateString('pt-BR') === d && o.status === 'paid').length);
                    main.innerHTML = `<div class="header"><h2>📊 Estatísticas</h2></div>
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-number">${stats.total}</div><div>Total Pedidos</div></div>
                            <div class="stat-card"><div class="stat-number">${stats.pending}</div><div>Pendentes</div></div>
                            <div class="stat-card"><div class="stat-number">${stats.paid}</div><div>Pagos</div></div>
                            <div class="stat-card"><div class="stat-number">R$ ${totalRevenue.toFixed(2)}</div><div>Faturamento</div></div>
                            <div class="stat-card total-paid"><div class="stat-number">R$ ${totalPaid.toFixed(2)}</div><div>💰 Recebido</div></div>
                        </div>
                        <div class="chart-container"><canvas id="salesChart"></canvas></div>`;
                    setTimeout(() => {
                        const ctx = document.getElementById('salesChart');
                        if(ctx) new Chart(ctx, { type:'line', data:{ labels:last7Days, datasets:[{ label:'Vendas confirmadas', data:salesByDay, borderColor:'#e31837', backgroundColor:'rgba(227,24,55,0.1)', fill:true, tension:0.4 }] }, options:{ responsive:true, maintainAspectRatio:true } });
                    }, 100);
                } else if (tab === 'pixels') {
                    main.innerHTML = `<div class="header"><h2><i class="fas fa-code"></i> Configurações</h2></div>
                        <div class="form-card"><h3>🌐 Domínio</h3><div class="domain-info"><p>🔗 <strong>Domínio Atual:</strong> <span class="current-domain" id="currentDomainDisplay">${siteConfig.siteDomain}</span></p></div><div class="form-group"><label>URL Base</label><input type="text" id="siteDomain" value="${siteConfig.siteDomain}"></div><button class="btn-success" onclick="saveDomainConfig()">💾 Salvar Domínio</button></div>
                        <div class="form-card"><h3><i class="fab fa-whatsapp"></i> WhatsApp</h3><div class="form-group"><label>Número (com DDD)</label><input type="text" id="whatsappNumber" value="${siteConfig.whatsappNumber}"></div><div class="form-group"><label>Mensagem Padrão</label><input type="text" id="whatsappMessage" value="${siteConfig.whatsappMessage}"></div><button class="btn-success" onclick="saveWhatsAppConfig()">💾 Salvar WhatsApp</button></div>
                        <div class="form-card"><h3><i class="fas fa-shield-alt"></i> Cloaker</h3><div class="form-group"><label><span class="switch"><input type="checkbox" id="cloakerActive" ${siteConfig.cloakerActive ? 'checked' : ''}><span class="slider"></span></span> Ativar Cloaker <span id="cloakerStatusSpan" class="cloaker-status ${siteConfig.cloakerActive ? 'cloaker-active' : 'cloaker-inactive'}">${siteConfig.cloakerActive ? 'ATIVADO' : 'DESATIVADO'}</span></label></div><button class="btn-success" onclick="saveCloakerConfig()">💾 Salvar Cloaker</button><button class="btn-primary" onclick="copyCloakerCode()" style="margin-left:10px;">📋 Copiar Código</button><textarea id="generatedCloakerCode" rows="4" readonly style="width:100%; margin-top:15px; background:#1a1a2e; color:#0f0; padding:10px; border-radius:10px; font-family:monospace; font-size:11px;"></textarea></div>
                        <div class="form-card"><h3><i class="fab fa-facebook"></i> Facebook Pixel</h3><div class="form-group"><label>Pixel ID</label><input type="text" id="fbPixelId" value="${siteConfig.facebookPixelId}"></div><div class="form-group"><label><input type="checkbox" id="fbPixelActive" ${siteConfig.facebookPixelActive ? 'checked' : ''}> Ativar</label></div><button class="test-pixel-btn" onclick="testPixel('facebook')">Testar</button></div>
                        <div class="form-card"><h3><i class="fab fa-tiktok"></i> TikTok Pixel</h3><div class="form-group"><label>Pixel ID</label><input type="text" id="ttPixelId" value="${siteConfig.tiktokPixelId}"></div><div class="form-group"><label><input type="checkbox" id="ttPixelActive" ${siteConfig.tiktokPixelActive ? 'checked' : ''}> Ativar</label></div><button class="test-pixel-btn" onclick="testPixel('tiktok')">Testar</button></div>
                        <div class="form-card"><h3><i class="fab fa-google"></i> Google Analytics</h3><div class="form-group"><label>GA4 ID</label><input type="text" id="gaId" value="${siteConfig.googleAnalyticsId}"></div><div class="form-group"><label><input type="checkbox" id="gaActive" ${siteConfig.googleAnalyticsActive ? 'checked' : ''}> Ativar</label></div><button class="test-pixel-btn" onclick="testPixel('google')">Testar</button></div>
                        <div class="form-card"><h3>📋 Código para o INDEX.HTML</h3><textarea id="generatedPixelCode" rows="6" readonly style="width:100%; background:#1a1a2e; color:#0f0; padding:10px; border-radius:10px; font-family:monospace; font-size:11px;"></textarea><button class="btn-primary" onclick="copyPixelCode()">📋 Copiar Código</button><button class="btn-success" onclick="savePixelConfig()" style="margin-left:10px;">💾 Salvar</button></div>`;
                    updateGeneratedPixelCode();
                } else if (tab === 'chat') {
                    main.innerHTML = `<div class="header"><h2><i class="fas fa-comments"></i> Chat ao Vivo</h2><button class="btn-delete-order" onclick="clearChat()">Limpar Histórico</button></div>
                        <div class="form-card"><div class="chat-messages" id="chatMessagesContainer"></div><div class="chat-input-group"><input type="text" id="chatAdminInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') sendAdminMessage()"><button onclick="sendAdminMessage()"><i class="fas fa-paper-plane"></i> Enviar</button></div><p style="font-size:12px; margin-top:15px; color:#aaa;">As mensagens atualizam automaticamente.</p></div>`;
                    loadChatMessages();
                    startChatPolling();
                }
                document.querySelectorAll('.nav-item[data-tab]').forEach(i => { if(i.dataset.tab === tab) i.classList.add('active'); else i.classList.remove('active'); });
            }
            
            function renderDashboard() {
                document.getElementById('app').innerHTML = `
                    <div class="admin-container">
                        <div class="sidebar">
                            <div class="logo">🏆 <span>Panini</span> Admin</div>
                            <div class="nav-item" data-tab="orders" onclick="showTab('orders')"><i class="fas fa-box"></i><span> Pedidos</span></div>
                            <div class="nav-item" data-tab="products" onclick="showTab('products')"><i class="fas fa-store"></i><span> Produtos</span></div>
                            <div class="nav-item" data-tab="stats" onclick="showTab('stats')"><i class="fas fa-chart-line"></i><span> Estatísticas</span></div>
                            <div class="nav-item" data-tab="pixels" onclick="showTab('pixels')"><i class="fas fa-code"></i><span> Configurações</span></div>
                            <div class="nav-item" data-tab="chat" onclick="showTab('chat')"><i class="fas fa-comments"></i><span> Chat</span></div>
                            <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span> Sair</span></div>
                        </div>
                        <div class="main-content" id="mainContent"></div>
                    </div>`;
                showTab('orders');
            }
            
            function renderLogin() {
                document.getElementById('app').innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <h2><i class="fas fa-shield-alt"></i> Panini Admin</h2>
                            <p>Área restrita - acesso autorizado</p>
                            <input type="text" id="adminUser" placeholder="Usuário" autocomplete="off">
                            <input type="password" id="adminPass" placeholder="Senha">
                            <button onclick="doLogin()">Entrar no Painel</button>
                        </div>
                    </div>`;
            }
            
            function doLogin() {
                const user = document.getElementById('adminUser').value;
                const pass = document.getElementById('adminPass').value;
                if(user === LOGIN_USER && pass === LOGIN_PASS) {
                    localStorage.setItem('adminLoggedIn', 'true');
                    isLoggedIn = true;
                    renderDashboard();
                } else {
                    alert('❌ Usuário ou senha incorretos!');
                }
            }
            
            function logout() {
                stopChatPolling();
                localStorage.removeItem('adminLoggedIn');
                isLoggedIn = false;
                renderLogin();
            }
            
            window.showTab = showTab;
            window.updateStatus = updateStatus;
            window.viewOrder = viewOrder;
            window.deleteOrder = deleteOrder;
            window.openEditProductModal = openEditProductModal;
            window.closeEditProductModal = closeEditProductModal;
            window.saveProductEdit = saveProductEdit;
            window.updateImagePreview = updateImagePreview;
            window.deleteProductFromEdit = deleteProductFromEdit;
            window.showAddProductForm = showAddProductForm;
            window.saveDomainConfig = saveDomainConfig;
            window.savePixelConfig = savePixelConfig;
            window.saveWhatsAppConfig = saveWhatsAppConfig;
            window.saveCloakerConfig = saveCloakerConfig;
            window.testPixel = testPixel;
            window.copyPixelCode = copyPixelCode;
            window.copyCloakerCode = copyCloakerCode;
            window.sendAdminMessage = sendAdminMessage;
            window.clearChat = clearChat;
            window.doLogin = doLogin;
            window.logout = logout;
            
            if(isLoggedIn) renderDashboard();
            else renderLogin();
        })();
    </script>
</body>
</html>
